<!DOCTYPE html>
<html>
<head>
    <title>Lightning Out OAuth</title>
    <script src="https://orgfarm-970d6624bd-dev-ed.develop.my.salesforce.com/lightning/lightning.out.js"></script>
</head>

<body>

<h3>Lightning Out Test</h3>
<button onclick="login()">Login</button>

<div id="container"></div>

<script>
const clientId = "3MVG9uq9ANVdsbAV4n4xOOxL0JH7bpyKPbwEYt_5f01n98dpZynEeE1CLtaRPybcgrPAFOUd_vWwFq8pGg0at";
const redirectUri = "https://sauravfcs.github.io";

function login() {
    const url =
        "https://login.salesforce.com/services/oauth2/authorize" +
        "?response_type=token" +
        "&client_id=" + clientId +
        "&redirect_uri=" + redirectUri;

    window.location.href = url;
}

function getToken() {
    const hash = window.location.hash;
    if (!hash) return null;

    const params = new URLSearchParams(hash.substring(1));
    return params.get("access_token");
}

window.onload = function () {
    const token = getToken();

    if (token) {
        console.log("✅ Token received");

        $Lightning.use(
            "c:GitApp",
            function () {
                $Lightning.createComponent(
                    "c:sfcomponentwrapper",
                    {},
                    "container",
                    function () {
                        console.log("✅ Component Loaded");
                    }
                );
            },
            "https://orgfarm-970d6624bd-dev-ed.develop.my.salesforce.com",
            token
        );
    } else {
        console.log("❌ No token found - click Login");
    }
};
</script>

</body>
</html>
